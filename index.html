<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <script>
      // COMPONENTE CORRETTO
      AFRAME.registerComponent('cambia-scena', {
        schema: { prossima: { type: 'string' } },
        init: function () {
          var el = this.el;
          var prossimaScena = this.data.prossima; // Recupero corretto dell'ID
          var sky = document.querySelector('#sky-display');

          el.addEventListener('click', function () {
            console.log("Cambio scena verso: " + prossimaScena);
            sky.setAttribute('src', prossimaScena);
          });
        }
      });
    </script>
  </head>
  <body>

    <a-scene>
      <a-assets>
        <img id="scena1" src="scena1_3D.jpg" crossorigin="anonymous">
        <img id="scena2" src="scena2_3D.jpg" crossorigin="anonymous">
        <img id="scena3" src="scena3_3D.jpg" crossorigin="anonymous">
        <img id="scena4" src="scena4_3D.jpg" crossorigin="anonymous">
        <img id="scena5" src="scena5_3D.jpg" crossorigin="anonymous">
        <img id="scena6" src="scena6_3D.jpg" crossorigin="anonymous">
        <img id="scena7" src="scena7_3D.jpg" crossorigin="anonymous">
        <img id="scena8" src="scena8_3D.jpg" crossorigin="anonymous">
      </a-assets>

      <a-sky 
        id="sky-display" 
        src="#scena1" 
        material="repeat: 1 0.5; offset: 0 0.5;" 
        rotation="0 -90 0">
      </a-sky>

      <a-sphere 
        position="2 1.6 -4" 
        radius="0.2" 
        color="yellow" 
        cambia-scena="prossima: #scena2"
        animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; dur: 1000; loop: true">
      </a-sphere>

      <a-sphere 
        position="-2 1.6 -4" 
        radius="0.2" 
        color="green" 
        cambia-scena="prossima: #scena3">
      </a-sphere>

      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor 
          fuse="true" 
          fuse-timeout="1500" 
          color="white"
          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03">
          <a-animation begin="fusing" easing="ease-in" attribute="scale" fill="forwards" from="1 1 1" to="0.1 0.1 0.1" dur="1500"></a-animation>
        </a-cursor>
      </a-entity>

    </a-scene>
  </body>
</html>

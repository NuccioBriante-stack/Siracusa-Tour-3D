<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siracusa Tour 3D - 8 Scene</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <script>
      // Componente personalizzato per cambiare l'immagine del cielo
      AFRAME.registerComponent('cambia-scena', {
        schema: {
          prossima: { type: 'string' }
        },
        init: function () {
          var el = this.el;
          var data = this.data;
          var sky = document.querySelector('#sky-display');

          el.addEventListener('click', function () {
            // Cambia la sorgente dell'immagine del cielo
            sky.setAttribute('src', data.prossima);
            console.log("Passaggio a: " + data.prossima);
          });
        }
      });
    </script>
  </head>
  <body>

    <a-scene>
      
      <a-assets>
        <img id="scena1" src="scena1_3D.jpg" crossorigin="anonymous">
        <img id="scena2" src="scena2_3D.jpg" crossorigin="anonymous">
        <img id="scena3" src="scena3_3D.jpg" crossorigin="anonymous">
        <img id="scena4" src="scena4_3D.jpg" crossorigin="anonymous">
        <img id="scena5" src="scena5_3D.jpg" crossorigin="anonymous">
        <img id="scena6" src="scena6_3D.jpg" crossorigin="anonymous">
        <img id="scena7" src="scena7_3D.jpg" crossorigin="anonymous">
        <img id="scena8" src="scena8_3D.jpg" crossorigin="anonymous">
      </a-assets>

      <a-sky 
        id="sky-display" 
        src="#scena1" 
        material="repeat: 1 0.5; offset: 0 0.5;" 
        phi-length="360"
        rotation="0 -90 0">
      </a-sky>

      <a-sphere 
        position="3 1.6 -5" 
        radius="0.2" 
        color="yellow" 
        cambia-scena="prossima: #scena2"
        animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; dur: 1000; loop: true">
      </a-sphere>

      <a-sphere 
        position="-4 1.6 -3" 
        radius="0.2" 
        color="cyan" 
        cambia-scena="prossima: #scena3">
      </a-sphere>

      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor 
          fuse="true" 
          fuse-timeout="1500" 
          color="#4CC3D9"
          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03">
        </a-cursor>
      </a-entity>

    </a-scene>

  </body>
</html>

<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siracusa Tour - Ripristino</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>
  <body>

    <a-scene>
      
      <a-assets>
        <img id="scena1" src="scena1_3D.jpg">
      </a-assets>

      <a-sky 
        id="sky-display" 
        src="#scena1" 
        repeat="1 0.5" 
        phi-length="360"
        rotation="0 -90 0">
      </a-sky>

      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor color="#4CC3D9"></a-cursor>
      </a-entity>

    </a-scene>

  </body>
</html>
